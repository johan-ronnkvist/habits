<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Habits Tracker{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="h-full">
    <div class="min-h-full">
        <!-- Navigation -->
        <nav class="bg-white shadow-sm border-b border-gray-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex">
                        <div class="flex-shrink-0 flex items-center">
                            <i class="fas fa-chart-line text-primary-600 text-2xl mr-2"></i>
                            <span class="text-xl font-bold text-gray-900">Habits</span>
                        </div>
                    </div>
                    <div class="flex space-x-8">
                        <a href="/" class="{% if request.url.path == '/' %}border-primary-500 text-gray-900{% else %}border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700{% endif %} inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
                            <i class="fas fa-home mr-2"></i>Dashboard
                        </a>
                        <a href="/habits" class="{% if request.url.path == '/habits' %}border-primary-500 text-gray-900{% else %}border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700{% endif %} inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
                            <i class="fas fa-cog mr-2"></i>Habits
                        </a>
                        <a href="/progress" class="{% if request.url.path == '/progress' %}border-primary-500 text-gray-900{% else %}border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700{% endif %} inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
                            <i class="fas fa-chart-bar mr-2"></i>Progress
                        </a>
                        <a href="/settings" class="{% if request.url.path == '/settings' %}border-primary-500 text-gray-900{% else %}border-transparent text-gray-500 hover:border-gray-300 hover:text-gray-700{% endif %} inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium">
                            <i class="fas fa-sliders-h mr-2"></i>Settings
                        </a>
                    </div>
                </div>
            </div>
        </nav>

        <!-- Page header -->
        <header class="bg-white shadow-sm">
            <div class="max-w-7xl mx-auto py-6 px-4 sm:px-6 lg:px-8">
                <h1 class="text-3xl font-bold text-gray-900">
                    {% block header %}{% endblock %}
                </h1>
                {% if subtitle %}
                <p class="mt-2 text-sm text-gray-600">{{ subtitle }}</p>
                {% endif %}
            </div>
        </header>

        <!-- Main content -->
        <main class="max-w-7xl mx-auto py-6 sm:px-6 lg:px-8">
            {% block content %}{% endblock %}
        </main>
    </div>

    <!-- Toast notifications container -->
    <div x-data="toastManager()" 
         class="fixed top-4 right-4 z-50 space-y-2">
        <template x-for="toast in toasts" :key="toast.id">
            <div x-show="toast.visible"
                 x-transition:enter="transform transition-all duration-300"
                 x-transition:enter-start="translate-x-full opacity-0"
                 x-transition:enter-end="translate-x-0 opacity-100"
                 x-transition:leave="transform transition-all duration-300"
                 x-transition:leave-start="translate-x-0 opacity-100"
                 x-transition:leave-end="translate-x-full opacity-0"
                 :class="`${toast.type === 'success' ? 'bg-green-500' : toast.type === 'error' ? 'bg-red-500' : 'bg-blue-500'} text-white px-6 py-3 rounded-lg shadow-lg flex items-center space-x-2`">
                <i :class="`fas fa-${toast.type === 'success' ? 'check' : toast.type === 'error' ? 'exclamation-triangle' : 'info'}-circle`"></i>
                <span x-text="toast.message"></span>
                <button @click="removeToast(toast.id)" class="ml-2 text-white hover:text-gray-200">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        </template>
    </div>

    <script>
        // Alpine.js toast notification system
        function toastManager() {
            return {
                toasts: [],
                nextId: 1,
                
                showToast(message, type = 'success') {
                    const toast = {
                        id: this.nextId++,
                        message,
                        type,
                        visible: true
                    };
                    
                    this.toasts.push(toast);
                    
                    // Auto remove after 5 seconds
                    setTimeout(() => {
                        this.removeToast(toast.id);
                    }, 5000);
                },
                
                removeToast(id) {
                    const index = this.toasts.findIndex(t => t.id === id);
                    if (index > -1) {
                        this.toasts[index].visible = false;
                        // Remove from array after animation completes
                        setTimeout(() => {
                            const currentIndex = this.toasts.findIndex(t => t.id === id);
                            if (currentIndex > -1) {
                                this.toasts.splice(currentIndex, 1);
                            }
                        }, 300);
                    }
                }
            }
        }

        // Global toast function for backward compatibility
        function showToast(message, type = 'success') {
            // Find the toast manager Alpine component
            const toastContainer = document.querySelector('[x-data*="toastManager"]');
            if (toastContainer && toastContainer._x_dataStack) {
                toastContainer._x_dataStack[0].showToast(message, type);
            }
        }

        // Form submission utilities
        async function submitFormAjax(form, options = {}) {
            const formData = new FormData(form);
            const method = form.method || 'POST';
            const action = form.action;
            
            try {
                const response = await fetch(action, {
                    method: method,
                    body: formData,
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });
                
                if (response.ok) {
                    if (options.onSuccess) {
                        options.onSuccess(response);
                    }
                    
                    // Show success toast
                    showToast(options.successMessage || 'Action completed successfully!', 'success');
                    
                    // Handle redirect
                    if (response.redirected) {
                        window.location.href = response.url;
                    }
                } else {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
            } catch (error) {
                if (options.onError) {
                    options.onError(error);
                }
                
                showToast(options.errorMessage || 'Something went wrong. Please try again.', 'error');
                console.error('Form submission error:', error);
            }
        }
        
        // Form submission handler with loading states
        document.addEventListener('alpine:init', () => {
            Alpine.directive('loading-form', (el, { expression }, { effect, evaluateLater }) => {
                let getState = evaluateLater(expression);
                
                effect(() => {
                    getState(isLoading => {
                        const submitBtn = el.querySelector('button[type="submit"]');
                        if (submitBtn) {
                            if (isLoading) {
                                submitBtn.disabled = true;
                                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Loading...';
                            } else {
                                submitBtn.disabled = false;
                                // Restore original content - store in data attribute
                                const originalContent = submitBtn.dataset.originalContent;
                                if (originalContent) {
                                    submitBtn.innerHTML = originalContent;
                                }
                            }
                        }
                    });
                });
            });
        });
    </script>
</body>
</html>
